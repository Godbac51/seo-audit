<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audyt SEO – Narzędzie do analizy stron</title>
<meta name="description" content="Darmowe narzędzie do audytu SEO.">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f9fb;--bg2:#fff;--bg3:#f0f2f5;
  --text:#1a1d23;--text2:#5a6070;--text3:#8a929e;
  --border:#e3e6ec;--border2:#cdd2db;
  --accent:#2563eb;
  --green:#16a34a;--green-bg:#f0fdf4;--green-border:#bbf7d0;
  --amber:#b45309;--amber-bg:#fffbeb;--amber-border:#fde68a;
  --red:#dc2626;--red-bg:#fef2f2;--red-border:#fecaca;
  --blue:#1d4ed8;--blue-bg:#eff6ff;--blue-border:#bfdbfe;
  --dark:#0f172a;
  --radius:10px;--radius-lg:14px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

/* HEADER */
.site-header{background:var(--dark);color:#fff;padding:0 2rem}
.header-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px}
.logo{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:.5rem}
.logo span{color:#60a5fa}
.header-badge{background:#1e3a5f;color:#93c5fd;font-size:.7rem;font-weight:600;padding:.2rem .6rem;border-radius:20px}

/* HERO */
.hero{background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%);color:#fff;padding:3rem 2rem 3.5rem;text-align:center}
.hero h1{font-size:2rem;font-weight:800;letter-spacing:-.03em;margin-bottom:.5rem}
.hero h1 span{color:#60a5fa}
.hero p{color:#94a3b8;font-size:.95rem;margin-bottom:1.75rem}
.search-wrap{max-width:580px;margin:0 auto}
.search-box{display:flex;background:#fff;border-radius:var(--radius-lg);overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.3)}
.search-box input{flex:1;border:none;outline:none;padding:.85rem 1.25rem;font-size:1rem;color:var(--text)}
.search-box input::placeholder{color:#94a3b8}
.btn-run{background:var(--accent);color:#fff;border:none;padding:.85rem 1.4rem;font-size:.95rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .2s}
.btn-run:hover{background:#1d4ed8}
.btn-run:disabled{background:#94a3b8;cursor:not-allowed}
.search-hint{color:#64748b;font-size:.78rem;margin-top:.6rem}

/* MAIN */
.main{max-width:900px;margin:0 auto;padding:2rem 1.5rem}

/* SECTION */
.section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:1.25rem;box-shadow:var(--shadow);overflow:hidden}
.section-hdr{padding:1rem 1.5rem;display:flex;align-items:center;gap:.75rem;cursor:pointer;user-select:none;transition:background .15s}
.section-hdr:hover{background:var(--bg3)}
.section.open .section-hdr{border-bottom:1px solid var(--border)}
.section-hdr-icon{font-size:1.1rem;width:28px;text-align:center;flex-shrink:0}
.section-hdr h3{flex:1;font-size:.95rem;font-weight:700}
.section-badge{font-size:.72rem;font-weight:700;padding:.2rem .7rem;border-radius:20px;white-space:nowrap}
.sb-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.sb-amber{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.sb-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.sb-blue{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.sb-gray{background:#f1f5f9;color:#94a3b8;border:1px solid #e2e8f0}
.chevron{font-size:.75rem;color:var(--text3);transition:transform .2s;margin-left:.25rem}
.section.open .chevron{transform:rotate(180deg)}
.section-body{padding:1.5rem;display:none}
.section.open .section-body{display:block}

/* DISABLED SECTION */
.section.disabled{opacity:.55;pointer-events:none}
.section.disabled .section-hdr{cursor:default;background:var(--bg3)}
.section.disabled .section-hdr h3{color:var(--text3)}
.wip-badge{font-size:.68rem;font-weight:600;background:#f1f5f9;color:#94a3b8;border:1px solid #e2e8f0;padding:.15rem .55rem;border-radius:10px;margin-left:.4rem}

/* CHECK ROWS */
.check-row{display:flex;align-items:flex-start;gap:.85rem;padding:.9rem 0;border-bottom:1px solid var(--border)}
.check-row:last-child{border-bottom:none}
.check-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0;margin-top:2px}
.ci-ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.ci-warn{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.ci-fail{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.ci-info{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.check-content{flex:1}
.check-content strong{display:block;font-size:.9rem;font-weight:600;margin-bottom:.25rem}
.check-content p{font-size:.83rem;color:var(--text2);line-height:1.5}
.check-content code{background:var(--bg3);padding:.1rem .35rem;border-radius:4px;font-size:.78rem;font-family:monospace;color:var(--accent);border:1px solid var(--border)}
.priority{font-size:.67rem;font-weight:700;padding:.15rem .5rem;border-radius:10px;margin-left:.5rem;display:inline-block}
.p-high{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.p-med{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.p-low{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}

/* HEADER TAGS */
.hdr-tags{display:flex;flex-wrap:wrap;gap:.4rem;margin:.75rem 0}
.hdr-tag{display:inline-flex;align-items:center;gap:.35rem;font-size:.78rem;font-weight:600;padding:.3rem .75rem;border-radius:20px}
.ht-ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.ht-fail{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.ht-warn{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}

/* GRADE BOX */
.grade-box{display:flex;align-items:center;gap:1.5rem;padding:1.25rem;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:1.25rem}
.grade-letter{width:72px;height:72px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:2.5rem;font-weight:800;flex-shrink:0}
.grade-a-plus{background:#dcfce7;color:#15803d;border:2px solid #86efac}
.grade-a{background:#dcfce7;color:#16a34a;border:2px solid #bbf7d0}
.grade-b{background:#fef9c3;color:#854d0e;border:2px solid #fde047}
.grade-c{background:#ffedd5;color:#9a3412;border:2px solid #fed7aa}
.grade-d,.grade-f{background:#fee2e2;color:#991b1b;border:2px solid #fca5a5}
.grade-unknown{background:var(--bg3);color:var(--text3);border:2px solid var(--border)}
.grade-info h4{font-size:1rem;font-weight:700;margin-bottom:.25rem}
.grade-info p{font-size:.83rem;color:var(--text2)}

/* LOADING */
.loading-state{text-align:center;padding:2rem;color:var(--text3)}
.spinner-sm{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:.5rem}
@keyframes spin{to{transform:rotate(360deg)}}

/* PROGRESS */
.progress-wrap{background:#fff;border-radius:var(--radius-lg);padding:1.75rem;max-width:460px;margin:2rem auto 0;text-align:center;box-shadow:var(--shadow);display:none}
.spinner-lg{width:32px;height:32px;border:3px solid #e2e8f0;border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto .75rem}
.prog-bar-outer{height:5px;background:#e2e8f0;border-radius:3px;margin:.75rem 0;overflow:hidden}
.prog-bar-inner{height:100%;background:var(--accent);border-radius:3px;transition:width .4s ease}
.step-list{list-style:none;text-align:left;font-size:.83rem;margin-top:.5rem}
.step-list li{padding:.25rem 0;display:flex;align-items:center;gap:.5rem;color:var(--text3)}
.step-list li.done{color:var(--green)}
.step-list li.active{color:var(--text);font-weight:500}
.step-list li::before{content:'○';font-size:.6rem;flex-shrink:0}
.step-list li.done::before{content:'✓';color:var(--green)}
.step-list li.active::before{content:'◉';color:var(--accent)}

/* BTN */
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.5rem 1rem;border-radius:8px;font-size:.83rem;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:var(--bg2);color:var(--text);text-decoration:none;transition:background .15s}
.btn:hover{background:var(--bg3);text-decoration:none}

/* INFO NOTE */
.info-note{background:var(--blue-bg);border:1px solid var(--blue-border);border-radius:8px;padding:.75rem 1rem;font-size:.82rem;color:#1e40af;margin-bottom:1rem}
.warn-note{background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:8px;padding:.75rem 1rem;font-size:.82rem;color:var(--amber);margin-bottom:1rem}

#results{display:none}
.site-footer{background:var(--dark);color:#64748b;text-align:center;padding:1.5rem;font-size:.78rem;margin-top:3rem}
.site-footer a{color:#60a5fa}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="logo">🔍 <strong>SEO<span>Audyt</span></strong></div>
    <span class="header-badge">v2.0 · W budowie</span>
  </div>
</header>

<div class="hero">
  <h1>Kompleksowy <span>Audyt SEO</span></h1>
  <p>Wpisz adres strony i uruchom audyt</p>
  <div class="search-wrap">
    <div class="search-box">
      <input type="text" id="urlInput" placeholder="https://twoja-strona.pl" autocomplete="off"/>
      <button class="btn-run" id="runBtn" onclick="startAudit()">Uruchom →</button>
    </div>
    <p class="search-hint">Naciśnij Enter lub kliknij przycisk</p>
  </div>
</div>

<div class="main">
  <div class="progress-wrap" id="progressWrap">
    <div class="spinner-lg"></div>
    <p style="font-weight:600;font-size:.95rem;margin-bottom:.25rem" id="progLabel">Analizuję…</p>
    <div class="prog-bar-outer"><div class="prog-bar-inner" id="progBar" style="width:5%"></div></div>
    <ul class="step-list">
      <li id="s0">Sprawdzanie nagłówków bezpieczeństwa</li>
    </ul>
  </div>

  <div id="results"></div>
</div>

<footer class="site-footer">
  Dane: <a href="https://securityheaders.com" target="_blank">SecurityHeaders.com</a> · Kolejne moduły w budowie
</footer>

<script>
const PROXY = 'https://api.allorigins.win/get?url=';

function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

function setStep(id, state){
  const el = document.getElementById(id);
  if(el) el.className = state;
}

// =============================================
// MODUŁ 1: Nagłówki bezpieczeństwa
// Źródło: securityheaders.com przez allorigins
// =============================================
async function checkSecurityHeaders(url) {
  try {
    const shUrl = `https://securityheaders.com/?q=${encodeURIComponent(url)}&followRedirects=on`;
    const proxyUrl = PROXY + encodeURIComponent(shUrl);
    const res = await fetch(proxyUrl);
    const json = await res.json();
    const html = json.contents || '';

    if(!html) return { ok: false, error: 'Brak odpowiedzi z serwera' };

    const doc = new DOMParser().parseFromString(html, 'text/html');

    // Grade — w dużym elemencie z klasą zawierającą grade
    let grade = null;
    // securityheaders.com ma grade w <div class="score ..."> lub w nagłówku raportu
    const gradeEl = doc.querySelector('.score') || 
                    doc.querySelector('[class*="grade"]') ||
                    doc.querySelector('.reportTitle');
    
    if(gradeEl) {
      const text = gradeEl.textContent.trim();
      const match = text.match(/^[A-F][+]?$/);
      if(match) grade = match[0];
    }

    // Próbuj z klasy CSS (securityheaders koduje grade w klasie)
    if(!grade) {
      const scoreDiv = doc.querySelector('.score');
      if(scoreDiv) {
        const cls = scoreDiv.className;
        const m = cls.match(/grade-([A-Fa-f+]+)/i) || cls.match(/([A-F][+]?)/);
        if(m) grade = m[1].toUpperCase();
      }
    }

    // Szukaj oceny w tytule strony
    if(!grade) {
      const titleText = doc.title || '';
      const m = titleText.match(/([A-F][+]?)\s*[-–]/);
      if(m) grade = m[1];
    }

    // Parsuj nagłówki z tabeli wyników
    const headers = {
      'Strict-Transport-Security': null,
      'Content-Security-Policy': null,
      'X-Frame-Options': null,
      'X-Content-Type-Options': null,
      'Referrer-Policy': null,
      'Permissions-Policy': null,
      'X-XSS-Protection': null,
    };

    // securityheaders.com renderuje kafelki z nagłówkami
    // szukamy elementów które zawierają nazwy nagłówków
    const allText = doc.body?.innerHTML || '';
    
    for(const hdr of Object.keys(headers)) {
      // Sprawdź czy nagłówek jest wymieniony jako "present" (zielony) czy "missing" (czerwony)
      // securityheaders.com używa klas jak 'present', 'missing', 'warning'
      const regex = new RegExp(hdr.replace(/-/g,'[\\s\\-]'), 'i');
      
      // Szukaj w nagłówkach raportowanych jako obecne
      const presentSection = doc.querySelector('.reportSection.present, .present, [class*="green"]');
      const missingSection = doc.querySelector('.reportSection.missing, .missing, [class*="red"]');
      
      // Prostsze podejście: sprawdź czy nazwa nagłówka pojawia się obok znacznika ✓ lub X
      const rows = doc.querySelectorAll('tr, .header-row, li, .reportRow');
      let found = null;
      
      for(const row of rows) {
        if(regex.test(row.textContent)) {
          const rowHtml = row.innerHTML.toLowerCase();
          const rowText = row.textContent.toLowerCase();
          if(rowHtml.includes('success') || rowHtml.includes('green') || 
             rowHtml.includes('present') || rowText.includes('✓') ||
             row.className.toLowerCase().includes('success') ||
             row.className.toLowerCase().includes('present')) {
            found = 'present';
          } else if(rowHtml.includes('danger') || rowHtml.includes('red') || 
                    rowHtml.includes('missing') || rowHtml.includes('error') ||
                    row.className.toLowerCase().includes('danger') ||
                    row.className.toLowerCase().includes('missing')) {
            found = 'missing';
          } else if(rowHtml.includes('warning') || rowHtml.includes('warn') ||
                    row.className.toLowerCase().includes('warning')) {
            found = 'warning';
          }
          if(found) break;
        }
      }
      headers[hdr] = found;
    }

    // Alternatywna metoda: szukaj w sekcjach "Raw Headers" lub podobnych
    // securityheaders.com często ma sekcję z listą nagłówków które są OK
    const rawSection = doc.querySelector('.rawHeaders, #rawHeaders, .headers-present');
    if(rawSection) {
      const rawText = rawSection.textContent;
      for(const hdr of Object.keys(headers)) {
        if(rawText.includes(hdr)) headers[hdr] = 'present';
      }
    }

    // Ostateczna metoda: po prostu sprawdź cały HTML
    // securityheaders.com w sekcji summary pokazuje które nagłówki są (checkbox ✓ vs ✗)
    const summaryHtml = doc.body?.innerHTML || '';
    for(const hdr of Object.keys(headers)) {
      if(headers[hdr] !== null) continue; // już wiemy
      if(!summaryHtml.includes(hdr)) continue; // w ogóle nie ma wzmianki
      
      // Jeśli nagłówek jest w raporcie, spróbuj ustalić status z kontekstu
      const idx = summaryHtml.indexOf(hdr);
      const context = summaryHtml.substring(Math.max(0, idx-200), idx+200).toLowerCase();
      
      if(context.includes('success') || context.includes('green') || context.includes('present')) {
        headers[hdr] = 'present';
      } else if(context.includes('danger') || context.includes('missing') || context.includes('red')) {
        headers[hdr] = 'missing';
      } else if(context.includes('warn')) {
        headers[hdr] = 'warning';
      }
    }

    // Oblicz wynik procentowy
    const present = Object.values(headers).filter(v => v === 'present').length;
    const total = Object.keys(headers).length;
    const score = Math.round((present / total) * 100);

    // Wyznacz ocenę jeśli nie udało się sparsować
    if(!grade) {
      grade = score >= 90 ? 'A+' : score >= 75 ? 'A' : score >= 60 ? 'B' : score >= 40 ? 'C' : score >= 20 ? 'D' : 'F';
    }

    return { ok: true, grade, headers, score, sourceUrl: shUrl, rawHtml: html.substring(0, 500) };

  } catch(e) {
    return { ok: false, error: e.message };
  }
}

// =============================================
// START AUDIT
// =============================================
async function startAudit() {
  let url = document.getElementById('urlInput').value.trim();
  if(!url) { alert('Wpisz adres URL'); return; }
  if(!/^https?:\/\//.test(url)) url = 'https://' + url;

  document.getElementById('runBtn').disabled = true;
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('results').style.display = 'none';
  document.getElementById('results').innerHTML = '';

  setStep('s0', 'active');
  document.getElementById('progLabel').textContent = 'Sprawdzanie nagłówków bezpieczeństwa…';
  document.getElementById('progBar').style.width = '20%';

  const secHeaders = await checkSecurityHeaders(url);

  document.getElementById('progBar').style.width = '100%';
  setStep('s0', 'done');
  await sleep(300);

  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('results').style.display = 'block';
  buildReport(url, secHeaders);
  document.getElementById('runBtn').disabled = false;
}

// =============================================
// BUILD REPORT
// =============================================
function buildReport(url, secHeaders) {
  const domain = url.replace(/^https?:\/\//, '').split('/')[0];

  function gradeClass(g) {
    if(!g) return 'grade-unknown';
    if(g === 'A+') return 'grade-a-plus';
    if(g.startsWith('A')) return 'grade-a';
    if(g.startsWith('B')) return 'grade-b';
    if(g.startsWith('C')) return 'grade-c';
    return 'grade-d';
  }

  function sbForGrade(g) {
    if(!g) return 'sb-gray';
    if(g.startsWith('A')) return 'sb-green';
    if(g.startsWith('B')) return 'sb-amber';
    return 'sb-red';
  }

  function gradeSummary(g) {
    if(g === 'A+') return 'Doskonała konfiguracja — wszystkie nagłówki bezpieczeństwa obecne.';
    if(g === 'A')  return 'Bardzo dobra konfiguracja — większość nagłówków ustawiona poprawnie.';
    if(g === 'B')  return 'Dobra konfiguracja — brakuje kilku ważnych nagłówków.';
    if(g === 'C')  return 'Przeciętna konfiguracja — warto uzupełnić brakujące nagłówki.';
    if(g === 'D')  return 'Słaba konfiguracja — brakuje większości nagłówków bezpieczeństwa.';
    if(g === 'F')  return 'Krytyczna konfiguracja — brakuje prawie wszystkich nagłówków!';
    return 'Nie udało się ustalić oceny.';
  }

  const HEADERS_INFO = {
    'Strict-Transport-Security': {
      label: 'Strict-Transport-Security (HSTS)',
      priority: 'high',
      desc: 'Wymusza HTTPS. Bez tego przeglądarka może załadować stronę przez niezabezpieczone HTTP.',
      fix: 'Strict-Transport-Security: max-age=31536000; includeSubDomains',
      wordpress: 'Plugin "HTTP Headers" lub linia w .htaccess'
    },
    'Content-Security-Policy': {
      label: 'Content-Security-Policy (CSP)',
      priority: 'high',
      desc: 'Chroni przed atakami XSS i wstrzykiwaniem złośliwych skryptów.',
      fix: "Content-Security-Policy: default-src 'self'",
      wordpress: 'Plugin "HTTP Headers" — wymaga konfiguracji dla każdego zasobu'
    },
    'X-Frame-Options': {
      label: 'X-Frame-Options',
      priority: 'med',
      desc: 'Chroni przed clickjackingiem — uniemożliwia osadzenie strony w ramce iframe.',
      fix: 'X-Frame-Options: SAMEORIGIN',
      wordpress: 'Plugin "HTTP Headers" lub .htaccess'
    },
    'X-Content-Type-Options': {
      label: 'X-Content-Type-Options',
      priority: 'med',
      desc: 'Blokuje MIME sniffing — przeglądarka nie będzie "zgadywać" typu pliku.',
      fix: 'X-Content-Type-Options: nosniff',
      wordpress: 'Plugin "HTTP Headers" lub .htaccess'
    },
    'Referrer-Policy': {
      label: 'Referrer-Policy',
      priority: 'low',
      desc: 'Kontroluje ile informacji o źródle ruchu jest przekazywanych do innych stron.',
      fix: 'Referrer-Policy: strict-origin-when-cross-origin',
      wordpress: 'Plugin "HTTP Headers"'
    },
    'Permissions-Policy': {
      label: 'Permissions-Policy',
      priority: 'low',
      desc: 'Kontroluje dostęp do funkcji przeglądarki (kamera, mikrofon, GPS).',
      fix: 'Permissions-Policy: geolocation=(), microphone=(), camera=()',
      wordpress: 'Plugin "HTTP Headers"'
    },
    'X-XSS-Protection': {
      label: 'X-XSS-Protection',
      priority: 'low',
      desc: 'Starszy nagłówek ochrony XSS (nowoczesne przeglądarki używają CSP). Wciąż zalecany.',
      fix: 'X-XSS-Protection: 1; mode=block',
      wordpress: 'Plugin "HTTP Headers" lub .htaccess'
    },
  };

  function statusIcon(status) {
    if(status === 'present') return '<div class="check-icon ci-ok">✓</div>';
    if(status === 'warning') return '<div class="check-icon ci-warn">!</div>';
    if(status === 'missing') return '<div class="check-icon ci-fail">✗</div>';
    return '<div class="check-icon ci-info">?</div>';
  }

  function pTag(p) {
    return `<span class="priority p-${p}">${p==='high'?'Wysoki':p==='med'?'Średni':'Niski'}</span>`;
  }

  // Buduj HTML sekcji nagłówków
  let headerRowsHtml = '';
  for(const [key, info] of Object.entries(HEADERS_INFO)) {
    const status = secHeaders.headers?.[key] ?? null;
    const isPresent = status === 'present';
    const isUnknown = status === null;
    
    headerRowsHtml += `
    <div class="check-row">
      ${statusIcon(isUnknown ? null : (isPresent ? 'present' : status === 'warning' ? 'warning' : 'missing'))}
      <div class="check-content">
        <strong>${info.label}${!isPresent && !isUnknown ? pTag(info.priority) : ''}</strong>
        <p>${info.desc}</p>
        ${!isPresent && !isUnknown ? `
          <p style="margin-top:.4rem">Zalecana wartość: <code>${info.fix}</code></p>
          <p style="margin-top:.2rem;color:var(--text3);font-size:.78rem">WordPress: ${info.wordpress}</p>
        ` : ''}
        ${isUnknown ? '<p style="color:var(--text3);font-style:italic">Nie udało się ustalić statusu — sprawdź ręcznie.</p>' : ''}
      </div>
    </div>`;
  }

  // Sekcje "w budowie"
  const wipSections = [
    { icon: '🔍', name: 'On-Page SEO' },
    { icon: '⚡', name: 'Wydajność / Core Web Vitals' },
    { icon: '🔐', name: 'SSL i certyfikat' },
    { icon: '🗺️', name: 'robots.txt i sitemap.xml' },
    { icon: '🤖', name: 'GEO – AI Optimization' },
    { icon: '🔗', name: 'Linki i Backlinki' },
  ];

  const wipHtml = wipSections.map(s => `
    <div class="section disabled">
      <div class="section-hdr">
        <span class="section-hdr-icon">${s.icon}</span>
        <h3>${s.name} <span class="wip-badge">W budowie</span></h3>
        <span class="section-badge sb-gray">—</span>
      </div>
    </div>`).join('');

  const html = `
  <!-- NAGŁÓWKI BEZPIECZEŃSTWA — AKTYWNA SEKCJA -->
  <div class="section open">
    <div class="section-hdr" onclick="toggle(this)">
      <span class="section-hdr-icon">🛡️</span>
      <h3>Nagłówki bezpieczeństwa HTTP</h3>
      <span class="section-badge ${secHeaders.ok ? sbForGrade(secHeaders.grade) : 'sb-gray'}">${secHeaders.ok ? 'Ocena: ' + (secHeaders.grade||'?') : 'Błąd'}</span>
      <span class="chevron">▾</span>
    </div>
    <div class="section-body">

      ${!secHeaders.ok ? `
        <div class="warn-note">
          ⚠ Nie udało się pobrać danych: ${secHeaders.error||'nieznany błąd'}<br>
          Sprawdź ręcznie: <a href="https://securityheaders.com/?q=${encodeURIComponent(url)}&followRedirects=on" target="_blank">securityheaders.com ↗</a>
        </div>
      ` : `
        <div class="grade-box">
          <div class="grade-letter ${gradeClass(secHeaders.grade)}">${secHeaders.grade||'?'}</div>
          <div class="grade-info">
            <h4>Ocena bezpieczeństwa: ${secHeaders.grade||'nieznana'}</h4>
            <p>${gradeSummary(secHeaders.grade)}</p>
          </div>
        </div>

        <div class="hdr-tags">
          ${Object.entries(secHeaders.headers||{}).map(([k,v]) => `
            <span class="hdr-tag ${v==='present'?'ht-ok':v==='warning'?'ht-warn':'ht-fail'}">
              ${v==='present'?'✓':v==='warning'?'!':'✗'} ${k.replace('Strict-Transport-Security','HSTS').replace('Content-Security-Policy','CSP').replace('X-Content-Type-Options','X-Content-Type').replace('Permissions-Policy','Permissions')}
            </span>`).join('')}
        </div>

        ${headerRowsHtml}

        <div style="margin-top:1.25rem;padding:.85rem 1rem;background:var(--bg3);border-radius:8px;border:1px solid var(--border)">
          <div style="font-size:.75rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem">Pełny raport</div>
          <a href="${secHeaders.sourceUrl}" target="_blank" class="btn">Otwórz SecurityHeaders.com ↗</a>
        </div>
      `}
    </div>
  </div>

  <!-- POZOSTAŁE SEKCJE — W BUDOWIE -->
  ${wipHtml}

  <div style="text-align:center;padding:1.5rem 0;color:var(--text3);font-size:.78rem">
    ${domain} · ${new Date().toLocaleDateString('pl-PL')} · Dane: SecurityHeaders.com
  </div>`;

  document.getElementById('results').innerHTML = html;
  // Otwórz aktywną sekcję
  const sec = document.querySelector('.section.open');
  if(sec) sec.querySelector('.section-body').style.display = 'block';
}

function toggle(hdr) {
  const sec = hdr.parentElement;
  sec.classList.toggle('open');
  sec.querySelector('.section-body').style.display = sec.classList.contains('open') ? 'block' : 'none';
}

document.getElementById('urlInput').addEventListener('keydown', e => {
  if(e.key === 'Enter') startAudit();
});
</script>
</body>
</html>
